<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INCLUI.ME | Meu Perfil</title>
    <link rel="stylesheet" href="./css/estilo.css">
    <link rel="stylesheet" href="./css/perfil-aluno.css">
</head>

<body>
    <nav id="sidebar">
        <div id="user">
            <img src="assets/imgs/avatar-do-usuario.png" alt="avatar" width="100px">
            <p id="user_infos">
                <span class="item-description">
Felipe Alves
                </span>
                <span class="item-description">
Aluno
                </span>
            </p>
        </div>
<ul id="side_items">
<li class="side-item">
<a href="#">

</a>
</li>
</ul>
    </nav>
    <main class="area-perfil">
        <section class="cabecalho-perfil">
            <h1>Meu perfil</h1>
            <p>Atualize suas informações pessoais no sistema.</p>
        </section>

        <section class="card-perfil">
            <h2>Editar informações</h2>

            <div class="formulario">
                <div class="linha-dupla">
                    <div class="campo">
                        <span>Nome</span>
                        <input id="nome_input" type="text" placeholder="Felipe" disabled>
                    </div>

                    <div class="campo">
                        <span>Sobrenome</span>
                        <input id="sobrenome_input" type="text" placeholder="Alves" disabled>
                    </div>
                </div>

                <div class="campo">
                    <span>E-mail</span>
                    <input id="email_input" type="email" placeholder="meuemail@email.com">
                </div>

                <div class="linha-dupla">
                    <div class="campo">
                        <span>Nova senha</span>
                        <input id="senha_input" type="password" placeholder="Digite uma nova senha">
                    </div>

                    <div class="campo">
                        <span>Confirmar nova senha</span>
                        <input id="confirmacao_senha_input" type="password" placeholder="Confirme a nova senha">
                    </div>
                </div>

                <div class="card-laudo">
                    <h3>Laudo</h3>
                    <p class="texto-laudo">
                        Envie seu laudo em PDF, PNG ou JPG. Você pode substituir ou excluir depois.
                    </p>

                    <div class="laudo-atual">
                        <span class="label-laudo">Arquivo atual:</span>
                        <span id="nome_laudo" class="nome-laudo">Nenhum laudo enviado</span>
                    </div>

                    <div class="campo">
                        <span>Selecionar novo laudo</span>
                        <input id="laudo_input" type="file" accept=".pdf,.png,.jpg,.jpeg">
                    </div>

                    <div class="acoes-laudo">
                        <button type="button" class="botao-secundario" onclick="enviarLaudo()">
                            Adicionar / Trocar laudo
                        </button>

                        <button type="button" class="botao-excluir" onclick="excluirLaudo()">
                            Excluir laudo
                        </button>
                    </div>

                    <div id="mensagem_laudo" class="msg-validacao"></div>
                </div>

                <div class="acoes-formulario">
                    <button class="botao" onclick="salvarAlteracoes()">Salvar alterações</button>
                </div>

                <div id="mensagem_erro" class="msg-validacao"></div>
            </div>
        </section>
    </main>

</body>

</html>
