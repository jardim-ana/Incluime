<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECTA+ | Cadastro</title>
    <link rel="stylesheet" href="css/cadastro.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/estilo.css">
</head>

<body style="margin: 0; padding: 0; font-family: 'Poppins', sans-serif;">
    <div class="header">
        <div class="container">
            <div class="logo">
                <img src="assets/imgs/inclui.me-semfundo.png" alt="Logo INCLUI.ME">
            </div>
            <ul class="navbar">
                <li><a href="index.html">Inicial</a></li>
                <li>|</li>
                <li><a href="login.html">Login</a></li>
                <li class="agora"><a href="#">Cadastro</a></li>
            </ul>
        </div>
    </div>

    <div class="login">
        <img src="assets/imgs/criancas-cadastro.webp" alt="Fundo" class="img-fundo-cadastro">

        <div class="card-cadastro">
            <div class="logo-box-card">
                <img src="assets/imgs/conecta_logo_transparente.png" alt="Logo CONECTA+">
            </div>

            <div class="conteudo-formulario">
                <h2>Crie sua conta</h2>

                <div class="formulario">
                    <div class="linha-dupla">
                        <div class="campo">
                            <span>Nome:</span>
                            <input id="nome_input" type="text" placeholder="Ex: Mateus">
                        </div>
                        <div class="campo">
                            <span>Sobrenome:</span>
                            <input id="sobrenome_input" type="text" placeholder="Ex: Silva">
                        </div>
                    </div>

                    <div class="campo">
                        <span>E-mail:</span>
                        <input id="email_input" type="text" placeholder="meuemail@provedor.com">
                    </div>

                    <div class="linha-dupla">
                        <div class="campo">
                            <span>Senha:</span>
                            <input id="senha_input" type="password" placeholder="******">
                        </div>
                        <div class="campo">
                            <span>Confirmar Senha:</span>
                            <input id="confirmacao_senha_input" type="password" placeholder="******">
                        </div>
                    </div>

                    <div class="campo">
                        <span>Selecione sua escola:</span>
                        <input type="text" id="escolaInput" placeholder="Digite o nome da escola">
                        <ul id="sugestoes"></ul>
                    </div>

                    <div class="campo">
                        <span>Tipo de usuário:</span>
                        <select id="tipo_usuario_select">
                            <option value="">Selecione...</option>
                            <option value="0">Familiar</option>
                            <option value="1">Diretor</option>
                        </select>
                    </div>

                    <button class="botao" onclick="cadastrar()">Cadastrar</button>
                    <div id="mensagem_erro" class="msg-validacao"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <h4>CONECTA+ &copy; 2026 | Educação & Inclusão</h4>
    </div>

    <script>
  var escolas = [
    "Escola Estadual João Silva",
  "Escola Municipal Machado de Assis",
  "Colégio Objetivo",
  "Etec de São Paulo",
  "Escola Estadual Paulo Freire"
  ];

  var input = document.getElementById("escolaInput");
  var sugestoes = document.getElementById("sugestoes");

  input.addEventListener("input", function () {
    var valor = input.value.toLowerCase();
    sugestoes.innerHTML = "";

    if (valor === "") {
      return;
    }

    for (var i = 0; i < escolas.length; i++) {
      if (escolas[i].toLowerCase().indexOf(valor) !== -1) {
        var li = document.createElement("li");
        li.textContent = escolas[i];

        li.onclick = function () {
          input.value = this.textContent;
          sugestoes.innerHTML = "";
        };

        sugestoes.appendChild(li);
      }
    }
  });
        function cadastrar() {
            var nomeVar = nome_input.value;
            var sobrenomeVar = sobrenome_input.value;
            var emailVar = email_input.value;
            var senhaVar = senha_input.value;
            var confirmacaoVar = confirmacao_senha_input.value;
            var usuarioVar = tipo_usuario_select.value;
            var escolaVar = escolaInput.value;

            mensagem_erro.innerHTML = "";
            if (nomeVar == "" || sobrenomeVar == "" || emailVar == "" || senhaVar == "" || confirmacaoVar == "" || usuarioVar == "") {
                mensagem_erro.innerHTML = "Preencha todos os campos!";
                return;
            }

            if (senhaVar != confirmacaoVar) {
                mensagem_erro.innerHTML = "As senhas não coincidem!";
                return;
            }

            if (senhaVar.length < 6) {
                mensagem_erro.innerHTML = "A senha deve ter pelo menos 6 caracteres!";
                return;
            }

            fetch("/cadastrar/cadastrar", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    nomeServer: nomeVar,
                    sobrenomeServer: sobrenomeVar,
                    emailServer: emailVar,
                    senhaServer: senhaVar,
                    usuarioServer: usuarioVar,
                    escolaServer: escolaVar
                }),
            })
                .then(function (resposta) {
                    console.log("resposta: ", resposta);

                    if (resposta.ok) {
                        mensagem_erro.innerHTML =
                            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

                        setTimeout(() => {
                            window.location = "login.html";
                        }, "2000");

                        limparFormulario();
                    } else {
                        throw "Houve um erro ao tentar realizar o cadastro!";
                    }


                    function limparFormulario() {
                        nome_input.value = "";
                        sobrenome_input.value = "";
                        email_input.value = "";
                    }
                })
                .catch(function (resposta) {
                    console.log(`#ERRO: ${resposta}`);
                });

            return false;
        }
    </script>
</body>

</html>
