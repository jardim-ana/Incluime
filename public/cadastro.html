<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECTA+ | Cadastro</title>
    <link rel="stylesheet" href="css/cadastro.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./css/estilo.css">
</head>
<body style="margin: 0; padding: 0; font-family: 'Poppins', sans-serif;"> 
    <div class="header">
    <div class="container">
        <div class="logo">
            <img src="assets/imgs/conecta_logo_transparente.png" alt="Logo CONECTA+">
        </div>
        <ul class="navbar">
            <li><a href="index.html">Inicial</a></li>
            <li>|</li>
            <li><a href="login.html">Login</a></li>
            <li class="agora"><a href="#">Cadastro</a></li>
        </ul>
    </div>
</div>

    <div class="login">
        <div class="card-cadastro">
            <h2>Crie sua conta</h2>
            
            <div class="formulario">
                <div class="linha-dupla">
                    <div class="campo">
                        <span>Nome:</span>
                        <input id="nome_input" type="text" placeholder="Ex: Mateus">
                    </div>
                    <div class="campo">
                        <span>Sobrenome:</span>
                        <input id="sobrenome_input" type="text" placeholder="Ex: Silva">
                    </div>
                </div>

                <div class="campo">
                    <span>E-mail:</span>
                    <input id="email_input" type="text" placeholder="meuemail@provedor.com">
                </div>

                <div class="linha-dupla">
                    <div class="campo">
                        <span>Senha:</span>
                        <input id="senha_input" type="password" placeholder="******">
                    </div>
                    <div class="campo">
                        <span>Confirmar Senha:</span>
                        <input id="confirmacao_senha_input" type="password" placeholder="******">
                    </div>
                </div>

                <div class="campo">
                    <span>Tipo de usuário:</span>
                    <select id="tipo_usuario_select">
                        <option value="">Selecione...</option>
                        <option value="professor">Familiar</option>
                        <option value="aluno">Diretor</option>
                    </select>
                </div>

                <button class="botao" onclick="cadastrar()">Cadastrar</button>
                
                <div id="mensagem_erro" class="msg-validacao" style="color: red; text-align: center; margin-top: 10px;"></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <h4>CONECTA+ &copy; 2026 | Educação & Inclusão</h4>
    </div>

    <script>
        function cadastrar() {
            var nome = nome_input.value;
            var sobrenome = sobrenome_input.value;
            var email = email_input.value;
            var senha = senha_input.value;
            var confirmacao = confirmacao_senha_input.value;

            mensagem_erro.innerHTML = "";
            if (nome == "" || sobrenome == "" || email == "" || senha == "" || confirmacao == "") {
                mensagem_erro.innerHTML = "Preencha todos os campos!";
                return;
            }

            if (senha != confirmacao) {
                mensagem_erro.innerHTML = "As senhas não coincidem!";
                return;
            }

            if (senha.length < 6) {
                mensagem_erro.innerHTML = "A senha deve ter pelo menos 6 caracteres!";
                return;
            }

            alert("Cadastro realizado com sucesso! (Simulação)");
        }
    </script>
</body>
</html>
