                <li class="side-item">
                    <a href="dashboard.html">

        <main class="area-questionario">

                    <div class="texto-escola-atual" id="escolaAtualTexto">Etec de São Paulo</div>

        <div class="formulario-questionario">

                <select class="select-nota" id="nota">

                <label>Comentário</label>
                <textarea class="textarea-comentario" id="comentario"></textarea>
            </div>

            <div class="acoes-questionario">
                <button class="botao" onclick="enviar()">Enviar</button>
            </div>

            <div id="msg" class="msg-validacao"></div>

        </div>

    </section>
    
    </main>
