<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECTA+ | Login</title>
    
    <link rel="stylesheet" href="css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./css/estilo_login.css">
</head>
<body style="margin: 0; padding: 0;">

    <div class="header">
        <div class="container">
            <h1 class="titulo">CONECTA+</h1>
            <ul class="navbar">
                <li><a href="index.html">Inicial</a></li>
                <li>|</li>
                <li class="agora"><a href="#">Login</a></li>
                <li><a href="cadastro.html">Cadastro</a></li>
            </ul>
        </div>
    </div>

    <div class="login-secao">
        <div class="card-login">
            <div class="logo-box">
                <img src="assets/logo.png" alt="" class="logo-img">
            </div>
            <h2>Entrar</h2>
            
            <div class="formulario">
                <div class="campo">
                    <span>E-mail:</span>
                    <input id="email_input" type="text" placeholder="meuemail@provedor.com">
                </div>

                <div class="campo">
                    <span>Senha:</span>
                    <input id="senha_input" type="password" placeholder="******">
                </div>

                <button class="botao" onclick="entrar()">Entrar</button>
                
                <div class="link-ajuda">
                    <span>Não tem uma conta? <a href="cadastro.html">Cadastre-se agora!</a></span>
                </div>

                <div id="mensagem_erro" class="msg-validacao"></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <h4>CONECTA+ &copy; 2026 | Educação & Inclusão</h4>
    </div>

    <script>
        function entrar() {
            var email = email_input.value;
            var senha = senha_input.value;
            var erro = document.getElementById("mensagem_erro");

            erro.innerHTML = "";

            if (email == "" || senha == "") {
                erro.innerHTML = "Preencha todos os campos para prosseguir.";
                return;
            }

            if (email.indexOf("@") == -1) {
                erro.innerHTML = "E-mail inválido!";
                return;
            }

            console.log("Realizando login...");
        }
    </script>
</body>
</html>
