<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONECTA+ | Login</title>

    <link rel="stylesheet" href="css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./css/estilo_login.css">
</head>

<body style="margin: 0; padding: 0;">

    <div class="header">
        <div class="container">
            <h1 class="titulo"><img src="assets/imgs/inclui.me-semfundo.png" alt=""></h1>
            <ul class="navbar">
                <li><a href="index.html">Inicial</a></li>
                <li>|</li>
                <li class="agora"><a href="#">Login</a></li>
                <li><a href="cadastro.html">Cadastro</a></li>
            </ul>
        </div>
    </div>

    <div class="login-secao">
        <img src="assets/imgs/criancas-login.jpg" alt="Fundo" class="img-fundo-login">

        <div class="card-login">
            <div class="logo-box">
                <img src="assets/imgs/conecta_logo_transparente.png" alt="Logo" class="logo-img">
            </div>
            <h2>Entrar</h2>

            <div class="formulario">
                <div class="campo">
                    <span>E-mail:</span>
                    <input id="email_input" type="text" placeholder="meuemail@provedor.com">
                </div>

                <div class="campo">
                    <span>Senha:</span>
                    <input id="senha_input" type="password" placeholder="******">
                </div>

                <button class="botao" onclick="entrar()">Entrar</button>

                <div class="link-ajuda">
                    <span>Não tem uma conta? <a href="cadastro.html">Cadastre-se agora!</a></span>
                </div>

                <div id="mensagem_erro" class="msg-validacao"></div>
            </div>
        </div>
    </div>

    <div class="footer">
        <h4>CONECTA+ &copy; 2026 | Educação & Inclusão</h4>
    </div>

    <script>
        function entrar() {
            var email = email_input.value;
            var senha = senha_input.value;
            var erro = document.getElementById("mensagem_erro");

            erro.innerHTML = "";

            if (email == "" || senha == "") {
                erro.innerHTML = "Preencha todos os campos para prosseguir.";
                return;
            }

            if (email.indexOf("@") == -1) {
                erro.innerHTML = "E-mail inválido!";
                return;
            }

            fetch("/usuarios/autenticar", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email: email,
                    senha: senha
                })
            }).then(function (resposta) {
                console.log("ESTOU NO THEN DO entrar()!")

                if (resposta.ok) {
                    console.log(resposta);

                    resposta.json().then(json => {
                        console.log(json);
                        console.log(JSON.stringify(json));
                        sessionStorage.EMAIL_USUARIO = json.email;
                        sessionStorage.NOME_USUARIO = json.nome;
                        sessionStorage.ID_USUARIO = json.id;

                        setTimeout(function () {
                            window.location = "./dashboard/cards.html";
                        }, 1000); 

                    });

                } else {

                    console.log("Houve um erro ao tentar realizar o login!");

                    resposta.text().then(texto => {
                        console.error(texto);
                        //finalizarAguardar(texto);
                    });
                }

            }).catch(function (erro) {
                console.log(erro);
            })

            return false;
        }

    </script>
</body>

</html>
